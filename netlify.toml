  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/roadmap"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/roadmap/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/billing"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/billing/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/coach-popout"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/coach-popout/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
