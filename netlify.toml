  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/settings/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/profile"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
